services:
  # ── ML Service (FastAPI + PyTorch) ─────────────────────────────────
  - type: web
    name: voice-os-ml
    runtime: python
    rootDir: ml_service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MODEL_PATH
        value: ./models/multilingual_intent_model
    plan: free

  # ── Backend (Express.js) ────────────────────────────────────────────
  - type: web
    name: voice-os-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
      - key: PORT
        value: 5000
      - key: ML_SERVICE_URL
        value: http://voice-os-ml:8000
      - key: NODE_ENV
        value: production
    plan: free

  # ── Frontend (React/Vite Static Site) ──────────────────────────────
  - type: web
    name: voice-os-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_BACKEND_URL
        sync: false   # Set this to your backend Render URL after deploying
    plan: free

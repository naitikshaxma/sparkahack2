name: Voice OS Bharat CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
      DATABASE_URL: sqlite:///./ci_test.db
      POSTGRES_URL: ""
      SESSION_STORE_BACKEND: memory
      RAG_WARMUP_ON_STARTUP: "0"
      JWT_REQUIRED_FOR_PROTECTED_ROUTES: "1"
      JWT_PROTECTED_PREFIXES: /api/intent,/api/process-text

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install pytest ruff

      - name: Lint
        run: ruff check backend/services/intent_service.py backend/api/v1/routes/voice_routes.py tests tools scripts

      - name: Run full pytest suite
        run: pytest -q

      - name: Run intent stability suite
        run: pytest -q tests/test_intent_stability.py tests/test_intent_flow.py tests/test_intent_advanced.py

      - name: Run full pipeline e2e suite
        run: pytest -q tests/test_full_pipeline.py
